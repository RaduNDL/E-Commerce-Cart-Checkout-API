<div class="container mt-4">
  <h2 class="mb-4">Products</h2>
  <div class="row row-cols-1 row-cols-md-3 g-4">
    @for (product of products(); track product.id) {
      <div class="col">
        <div class="card h-100 shadow-sm">
          @if (product.imageUrl) {
            <img [src]="product.imageUrl" class="card-img-top" style="height:200px;object-fit:cover"
                 onerror="this.style.display='none'" alt="{{ product.name }}" />
          }
          <div class="card-body d-flex flex-column">
            <h5 class="card-title">{{ product.name }}</h5>
            <p class="card-text text-muted small">{{ product.category }}</p>
            <p class="card-text flex-grow-1">{{ product.description }}</p>
            <div class="d-flex justify-content-between align-items-center mt-2">
              <span class="fw-bold fs-5">{{ product.price | currency }}</span>
              <button class="btn btn-primary btn-sm" (click)="addToCart(product)">
                @if (added()[product.id]) { ✓ Added } @else { Add to Cart }
              </button>
            </div>
          </div>
        </div>
      </div>
    }
  </div>
</div>
